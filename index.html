<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================================
       CUSTOMIZATION: Change the tab title of your website here
       ============================================================ -->
  <title>The Way He Wants Me — Mouth Full of Static</title>

  <!-- Google Fonts — change these URLs to swap typefaces -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-mode" id="body">

  <!-- ============================================================
       ATMOSPHERIC LAYER: fog + dust particles (generated by JS)
       ============================================================ -->
  <div id="fog-overlay" aria-hidden="true"></div>
  <canvas id="dust-canvas" aria-hidden="true"></canvas>

  <!-- ============================================================
       LANDING / HERO SECTION
       To change the background image: edit images/background.jpg
       ============================================================ -->
  <section id="landing" role="banner">
    <div class="parallax-bg" id="parallax-bg" aria-hidden="true"></div>

    <!-- Decorative lace borders -->
    <div class="lace-top" aria-hidden="true"></div>
    <div class="lace-bottom" aria-hidden="true"></div>

    <div class="landing-content" id="landing-content">

      <!-- CUSTOMIZATION: Change the institution / subtitle tag here -->
      <p class="eyebrow">C.A.R.E. Patient File — Cognitive Affective Regression Archive</p>

      <!-- CUSTOMIZATION: Change the novel title here -->
      <h1 class="novel-title">The Way He<br /><em>Wants Me</em></h1>

      <!-- CUSTOMIZATION: Change the subtitle here -->
      <p class="novel-subtitle">Mouth Full of Static</p>

      <!-- CUSTOMIZATION: Replace images/cover.jpg with your own cover -->
      <div class="cover-frame" aria-label="Novel cover">
        <img
          src="images/cover.svg"
          alt="The Way He Wants Me — novel cover"
          class="cover-img"
          onerror="this.style.display='none';this.parentElement.classList.add('cover-placeholder')"
        />
        <div class="cover-placeholder-text" aria-hidden="true">
          <span>♱</span>
        </div>
      </div>

      <!-- CUSTOMIZATION: Change the author name here -->
      <p class="author-name">by <em>anonymous</em></p>

      <!-- Decorative quote -->
      <p class="landing-quote">"Give in. You've been fighting for so long."</p>

      <button class="begin-btn" id="begin-btn" aria-label="Begin reading the novel">
        Begin Reading
        <span class="btn-arrow" aria-hidden="true">↓</span>
      </button>

    </div>
  </section>

  <!-- ============================================================
       READING INTERFACE
       ============================================================ -->
  <main id="reading-section" role="main" aria-label="Novel reading area">

    <!-- ── TOP BAR ─────────────────────────────────────────────── -->
    <header class="reading-header" role="banner">
      <button class="nav-btn" id="back-to-top-btn" aria-label="Return to landing page">
        ← Archive
      </button>

      <span class="header-title" aria-label="Current chapter">
        <span id="header-chapter-name">Chapter I</span>
      </span>

      <!-- Controls cluster -->
      <div class="header-controls">

        <!-- Font size -->
        <button class="icon-btn" id="font-decrease" aria-label="Decrease font size" title="Smaller text">A−</button>
        <button class="icon-btn" id="font-increase" aria-label="Increase font size" title="Larger text">A+</button>

        <!-- Dark / Light toggle -->
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark or light reading mode" title="Toggle theme">
          <span id="theme-icon">☽</span>
        </button>

        <!-- TOC toggle -->
        <button class="icon-btn" id="toc-toggle" aria-label="Open table of contents" title="Table of contents">
          ☰
        </button>

      </div>
    </header>

    <!-- ── PROGRESS BAR ──────────────────────────────────────────── -->
    <div class="progress-container" role="progressbar" aria-label="Reading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- ── READING BODY ──────────────────────────────────────────── -->
    <div class="reading-layout">

      <!-- TABLE OF CONTENTS (collapsible sidebar) -->
      <aside id="toc-sidebar" class="toc-sidebar" aria-label="Table of contents" aria-hidden="true">
        <div class="toc-inner">
          <p class="toc-label">Contents</p>
          <nav aria-label="Chapter navigation">
            <ul class="toc-list" id="toc-list">
              <!-- Generated by JS from the chapters array in script.js -->
            </ul>
          </nav>

          <!-- ── MUSIC PLAYER ──────────────────────────────────── -->
          <div class="music-player" aria-label="Music player">
            <p class="music-label">♪ Soundtrack</p>

            <!-- Spotify embed -->
            <!-- CUSTOMIZATION: Replace the Spotify playlist URL here -->
            <div class="spotify-embed-wrap">
              <iframe
                id="spotify-iframe"
                title="Novel soundtrack on Spotify"
                src="https://open.spotify.com/embed/playlist/0euZ3MOW3A4yu8SB9MQzYO?utm_source=generator&theme=0"
                width="100%"
                height="152"
                frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                style="border-radius:12px;">
              </iframe>
            </div>

            <!-- Fallback local player (shown if Spotify is unavailable) -->
            <!-- CUSTOMIZATION: Replace the mp3 paths with your own audio files -->
            <div class="local-player" id="local-player" aria-label="Local audio player" hidden>
              <div class="track-info">
                <span class="track-icon" aria-hidden="true">♫</span>
                <span id="track-name" class="track-name">—</span>
              </div>
              <div class="player-controls">
                <button class="player-btn" id="prev-track" aria-label="Previous track">‹‹</button>
                <button class="player-btn play-pause" id="play-pause-btn" aria-label="Play or pause">▶</button>
                <button class="player-btn" id="next-track" aria-label="Next track">››</button>
              </div>
              <div class="volume-row">
                <span aria-hidden="true">♪</span>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="0.7" aria-label="Volume" />
              </div>
              <audio id="audio-player" preload="none"></audio>
            </div>
          </div>

          <!-- FAVOURITE QUOTES -->
          <div class="quotes-section" aria-label="Saved quotes">
            <p class="toc-label">Marked passages</p>
            <ul id="quotes-list" class="quotes-list">
              <li class="quotes-empty">Highlight any sentence in the text to save it here.</li>
            </ul>
            <button class="clear-quotes-btn" id="clear-quotes-btn" aria-label="Clear all saved quotes">Clear all</button>
          </div>

        </div>
      </aside>

      <!-- ── CHAPTER CONTENT ──────────────────────────────────────── -->
      <article class="reading-column" id="reading-column" aria-live="polite" aria-label="Chapter text">

        <!-- Reading meta -->
        <div class="reading-meta" id="reading-meta">
          <span id="estimated-time" aria-label="Estimated reading time"></span>
        </div>

        <!-- Chapter title shown above prose -->
        <h2 class="chapter-heading" id="chapter-heading"></h2>

        <!-- Prose content injected here by script.js -->
        <div class="prose" id="prose-content"></div>

        <!-- Chapter navigation (bottom) -->
        <nav class="chapter-nav" aria-label="Chapter navigation">
          <button class="nav-btn chapter-prev" id="prev-chapter-btn" aria-label="Previous chapter">
            ← Previous
          </button>
          <span class="chapter-counter" id="chapter-counter" aria-live="polite"></span>
          <button class="nav-btn chapter-next" id="next-chapter-btn" aria-label="Next chapter">
            Next →
          </button>
        </nav>

      </article>

    </div>
  </main>

  <!-- ── SELECTION TOOLTIP (save quote) ──────────────────────────── -->
  <div id="selection-tooltip" class="selection-tooltip" role="tooltip" aria-hidden="true">
    <button id="save-quote-btn" aria-label="Save highlighted passage">♡ Save passage</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
